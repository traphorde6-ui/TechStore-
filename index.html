    // GERADOR AUTOMÁTICO DE FEEDBACKS / AVALIAÇÕES
    function generateProductReviews() {
      const reviewNames = [
        "Carlos Silva", "Ana Souza", "Fernanda Lima", "Lucas Oliveira", "Mariana Costa",
        "Gabriel Santos", "Juliana Pereira", "Rodrigo Alves", "Camila Martins", "Thiago Rocha",
        "Beatriz Gomes", "Rafael Melo", "Patrícia Ribeiro", "Diego Fernandes", "Amanda Carvalho",
        "Bruno Teixeira", "Vanessa Barbosa", "Felipe Nascimento", "Aline Santos", "Marcelo Dias"
      ];

      const reviewCommentsGeneral = [
        "Excelente produto! Chegou antes do prazo e a qualidade superou todas as minhas expectativas.",
        "Muito bom, valeu cada centavo. Veio super bem embalado e idêntico ao anúncio.",
        "Gostei demais! Comprarei novamente na loja com certeza, atendimento de primeira.",
        "Produto sensacional! Qualidade impecável e muito bonito.",
        "Ótimo custo-benefício. Recomendo a todos da comunidade!"
      ];

      const perfumeComments = [
        "Fragrância surreal! A fixação na minha pele passa de 8 horas com tranquilidade.",
        "Que perfume espetacular! Rastro marcante, recebi vários elogios já no primeiro dia de uso.",
        "Aroma muito sofisticado e elegante. Veio bem lacrado na caixa original, nota 10!",
        "Cheiro viciante! O frasco é lindo e a projeção nas primeiras 2 horas é excelente."
      ];

      const timeAgos = ["há 1 dia", "há 2 dias", "há 3 dias", "há 5 dias", "há 1 semana", "há 2 semanas"];

      products.forEach(product => {
        let feedbackCount = product.category === "perfumes" ? 15 : 10;
        let commentsList = product.category === "perfumes" ? perfumeComments : reviewCommentsGeneral;

        product.reviews = [];

        for (let i = 0; i < feedbackCount; i++) {
          const randomName = reviewNames[Math.floor(Math.random() * reviewNames.length)];
          const randomComment = commentsList[Math.floor(Math.random() * commentsList.length)];
          const randomTime = timeAgos[Math.floor(Math.random() * timeAgos.length)];
          const randomStars = Math.random() > 0.2 ? 5 : 4;

          product.reviews.push({
            name: randomName,
            comment: randomComment,
            date: randomTime,
            rating: randomStars
          });
        }
      });
    }

    generateProductReviews();

    function getStarsHTML(rating) {
      const fullStars = Math.floor(rating);
      let starsHTML = '';
      for (let i = 0; i < 5; i++) {
        starsHTML += i < fullStars 
          ? `<i data-lucide="star" class="w-3.5 h-3.5 fill-amber-400 text-amber-400 inline"></i>`
          : `<i data-lucide="star" class="w-3.5 h-3.5 text-gray-300 inline"></i>`;
      }
      return starsHTML;
    }

    function filterCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.className = 'cat-btn bg-white text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 border border-gray-200 px-5 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap transition-all duration-300 shadow-sm hover:scale-105 active:scale-95';
      });
      const activeBtn = document.getElementById(`cat-${category}`);
      if (activeBtn) {
        activeBtn.className = 'cat-btn bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap transition-all duration-300 shadow-md hover:scale-105 active:scale-95';
      }
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const filtered = currentCategory === 'todos' ? products : products.filter(p => p.category === currentCategory);

      if (filtered.length === 0) {
        grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-12">Nenhum produto encontrado.</p>`;
        return;
      }

      grid.innerHTML = filtered.map((product) => `
        <div class="group bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-xl transition-all duration-300 hover:-translate-y-1.5 animate-fade-in-up">
          <div class="relative cursor-pointer overflow-hidden bg-white aspect-square flex items-center justify-center p-3" onclick="openProductModal(${product.id})">
            ${product.oldPrice ? `<span class="absolute top-3 left-3 bg-red-500 text-white font-extrabold text-[10px] px-2.5 py-1 rounded-full shadow-md z-10">OFERTA</span>` : ''}
            <img src="${product.image}" alt="${product.title}" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
          </div>
          <div class="p-5 flex flex-col flex-1">
            <h4 onclick="openProductModal(${product.id})" class="text-base font-bold text-gray-800 mb-1 hover:text-indigo-600 cursor-pointer transition-colors line-clamp-2">${product.title}</h4>
            <div class="flex items-center gap-1.5 mb-2 text-xs text-gray-500">
              <span class="flex items-center gap-0.5">${getStarsHTML(product.rating)}</span>
              <span class="font-bold text-gray-700">${product.rating}</span>
              <span>(${product.reviews ? product.reviews.length : product.salesCount} avaliações)</span>
            </div>
            <p class="text-gray-500 text-xs mb-4 flex-1 line-clamp-2">${product.shortDescription}</p>
            <div class="flex items-center justify-between mt-auto pt-3 border-t border-gray-50">
              <div>
                ${product.oldPrice ? `<span class="text-xs text-gray-400 line-through block">R$ ${product.oldPrice.toFixed(2).replace('.', ',')}</span>` : '<span class="text-xs text-gray-400 block font-bold">À vista no PIX</span>'}
                <span class="text-lg font-black text-indigo-600">R$ ${product.price.toFixed(2).replace('.', ',')}</span>
              </div>
              <button onclick="openProductModal(${product.id})" class="btn-shimmer bg-indigo-600 hover:bg-indigo-700 text-white px-3.5 py-2.5 rounded-xl text-xs font-bold flex items-center gap-1.5 transition-all shadow-md active:scale-90">

        </div>
      `).join('');

              ${product.sizes ? `
                <div class="mb-4">
                  <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Selecione o Tamanho:</label>
                  <div class="flex gap-2 flex-wrap max-h-36 overflow-y-auto p-1">
                    ${product.sizes.map(size => `
                      <button onclick="selectSize('${size}')" id="size-btn-${size}" class="size-btn border-2 ${size === selectedSize ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-gray-200 text-gray-700 hover:border-gray-300'} font-bold text-xs py-2 px-3.5 rounded-xl transition-all active:scale-95">
                        ${size}
                      </button>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>

            <button onclick="addCustomToCart(${product.id})" class="btn-shimmer animate-pulse-glow w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-2xl font-black flex justify-center items-center gap-2 shadow-lg hover:shadow-indigo-500/40 transition-all active:scale-95">
              <i data-lucide="shopping-cart" class="animate-bounce"></i> Adicionar ao Carrinho
            </button>
          </div>
        </div>

        <div class="mt-8 border-t border-gray-100 pt-6">
          <div class="flex items-center justify-between mb-4">
            <h4 class="text-lg font-black text-gray-800 flex items-center gap-2">
              <i data-lucide="message-square" class="text-indigo-600 w-5 h-5"></i>
              Avaliações dos Clientes
            </h4>
            <span class="text-xs bg-indigo-50 text-indigo-700 font-extrabold px-3 py-1.5 rounded-full border border-indigo-100">
              ${product.reviews ? product.reviews.length : 0} avaliações
            </span>
          </div>

          <div class="space-y-3 max-h-64 overflow-y-auto pr-1">
            ${product.reviews ? product.reviews.map(rev => `
              <div class="bg-gray-50 p-3.5 rounded-2xl border border-gray-100 text-xs">
                <div class="flex justify-between items-center mb-1.5">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 font-black flex items-center justify-center text-xs shadow-sm">
                      ${rev.name.charAt(0)}
                    </div>
                    <span class="font-extrabold text-gray-800">${rev.name}</span>
                  </div>
                  <span class="text-[11px] text-gray-400 font-medium">${rev.date}</span>
                </div>
                <div class="flex items-center gap-1 mb-1">
                  ${getStarsHTML(rev.rating)}
                </div>
                <p class="text-gray-600 leading-relaxed">${rev.comment}</p>
              </div>
            `).join('') : '<p class="text-gray-400 text-xs">Nenhuma avaliação ainda.</p>'}
          </div>
        </div>
      `;

      document.getElementById('product-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function changeSlide(direction, productId) {
      const product = products.find(p => p.id === productId);
      if (!product || !product.gallery) return;

      currentSlideIndex = (currentSlideIndex + direction + product.gallery.length) % product.gallery.length;
      setSlide(currentSlideIndex, productId);
    }

    function setSlide(index, productId) {
      const product = products.find(p => p.id === productId);
      if (!product || !product.gallery) return;

      currentSlideIndex = index;
      const galleryItem = product.gallery[index];
      selectedColor = galleryItem.color;

      const mainImg = document.getElementById('modal-main-image');
      if (mainImg) mainImg.src = galleryItem.url;

      const tag = document.getElementById('slide-color-tag');
      if (tag) tag.innerText = `Cor: ${galleryItem.color}`;

      document.querySelectorAll('.thumb-btn').forEach((btn, idx) => {
        if (idx === index) {
          btn.className = 'thumb-btn border-2 border-indigo-600 scale-105 rounded-xl overflow-hidden flex-shrink-0 transition-all bg-white p-1';
        } else {
          btn.className = 'thumb-btn border-2 border-transparent rounded-xl overflow-hidden flex-shrink-0 transition-all opacity-70 bg-white p-1';
        }
      });
    }

    function selectSize(size) {
      selectedSize = size;
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.className = 'size-btn border-2 border-gray-200 text-gray-700 hover:border-gray-300 font-bold text-xs py-2 px-3.5 rounded-xl transition-all active:scale-95';
      });
      const activeBtn = document.getElementById(`size-btn-${size}`);
      if (activeBtn) {
        activeBtn.className = 'size-btn border-2 border-indigo-600 bg-indigo-600 text-white font-bold text-xs py-2 px-3.5 rounded-xl transition-all active:scale-95';
      }
    }

    function addCustomToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      let variationText = [];
      if (selectedColor && selectedColor !== 'Padrão') variationText.push(`Cor: ${selectedColor}`);
      if (selectedSize) variationText.push(`Tam: ${selectedSize}`);

      const itemTitle = product.title + (variationText.length > 0 ? ` (${variationText.join(', ')})` : '');
      const itemImage = product.gallery ? product.gallery[currentSlideIndex].url : product.image;

      const cartItemId = `${productId}-${selectedColor || 'default'}-${selectedSize || 'default'}`;
      const existing = cart.find(item => item.cartItemId === cartItemId);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          ...product,
          cartItemId,
          title: itemTitle,
          image: itemImage,
          quantity: 1
        });
      }

      confetti({ particleCount: 30, spread: 60, origin: { y: 0.5 } });
      closeProductModal();
      updateCart();
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    function changeQuantity(cartItemId, delta) {
      const item = cart.find(i => i.cartItemId === cartItemId || i.id === cartItemId);
      if (!item) return;

      item.quantity += delta;
      if (item.quantity <= 0) {
        cart = cart.filter(i => (i.cartItemId || i.id) !== cartItemId);
      }
      updateCart();
    }

    function updateCart() {
      const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').innerText = totalCount;

      const cartItemsContainer = document.getElementById('cart-items');
      const nextBtn = document.getElementById('next-to-address-btn');

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = `<p class="text-center text-gray-400 my-12">Seu carrinho está vazio 🛒</p>`;
        nextBtn.disabled = true;
      } else {
        nextBtn.disabled = false;
        cartItemsContainer.innerHTML = cart.map(item => `
          <div class="py-3.5 flex items-center gap-3">
            <img src="${item.image}" class="w-14 h-14 object-contain bg-white rounded-xl border border-gray-100 p-1">
            <div class="flex-1">
              <h5 class="font-bold text-xs text-gray-800 line-clamp-2">${item.title}</h5>
              <span class="text-xs text-indigo-600 font-extrabold">R$ ${item.price.toFixed(2).replace('.', ',')}</span>
            </div>
            <div class="flex items-center gap-1.5 bg-gray-100 rounded-xl p-1">
              <button onclick="changeQuantity('${item.cartItemId || item.id}', -1)" class="w-6 h-6 flex items-center justify-center bg-white rounded-lg shadow-sm font-bold text-gray-600">-</button>
              <span class="text-xs font-bold px-1">${item.quantity}</span>
              <button onclick="changeQuantity('${item.cartItemId || item.id}', 1)" class="w-6 h-6 flex items-center justify-center bg-white rounded-lg shadow-sm font-bold text-gray-600">+</button>
            </div>
          </div>
        `).join('');
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('cart-subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
      updateCheckoutTotals();
      lucide.createIcons();
    }

    function toggleCart() {
      document.getElementById('cart-modal').classList.toggle('hidden');
      goToCartStep();
    }

    function goToAddressStep() {
      document.getElementById('step-cart').classList.add('hidden');
      document.getElementById('step-address').classList.remove('hidden');
      document.getElementById('modal-title').innerHTML = `<i data-lucide="map-pin" class="text-indigo-600"></i> Endereço de Entrega`;
      updateCheckoutTotals();
      lucide.createIcons();
    }

    function goToCartStep() {
      document.getElementById('step-address').classList.add('hidden');
      document.getElementById('step-cart').classList.remove('hidden');
      document.getElementById('modal-title').innerHTML = `<i data-lucide="shopping-cart" class="text-indigo-600"></i> Seu Carrinho`;
      lucide.createIcons();
    }

    function calculateShipping(uf) {
      const ufUpper = uf.toUpperCase().trim();

      const shippingRules = {
        'SP': { cost: 0.00, days: "1 a 2" },
        'RJ': { cost: 14.90, days: "2 a 4" },
        'MG': { cost: 15.90, days: "3 a 5" },
        'ES': { cost: 18.50, days: "3 a 5" },
        'PR': { cost: 19.90, days: "3 a 6" },
        'SC': { cost: 21.90, days: "4 a 6" },
        'RS': { cost: 24.90, days: "4 a 7" },
        'DF': { cost: 22.00, days: "3 a 5" },
        'GO': { cost: 23.50, days: "4 a 6" },
        'BA': { cost: 29.90, days: "5 a 8" },
        'PE': { cost: 34.90, days: "6 a 9" },
        'CE': { cost: 36.90, days: "6 a 10" },
        'AM': { cost: 48.90, days: "8 a 14" },
        'PA': { cost: 42.90, days: "7 a 12" }
      };

      const defaultRule = { cost: 32.00, days: "5 a 10" };

      const result = shippingRules[ufUpper] || defaultRule;
      shippingCost = result.cost;
      shippingDays = result.days;

      document.getElementById('shipping-info-box').classList.remove('hidden');
      document.getElementById('shipping-days').innerText = `${shippingDays} dias úteis`;
      document.getElementById('shipping-cost').innerText = shippingCost === 0 ? "GRÁTIS" : `R$ ${shippingCost.toFixed(2).replace('.', ',')}`;

      updateCheckoutTotals();
    }

    function updateCheckoutTotals() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const total = subtotal + shippingCost;

      document.getElementById('checkout-subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
      document.getElementById('checkout-shipping').innerText = shippingCost === 0 ? "GRÁTIS" : `R$ ${shippingCost.toFixed(2).replace('.', ',')}`;
      document.getElementById('checkout-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    async function fetchCEP(cep) {
      const cleanCEP = cep.replace(/\D/g, '');
      if (cleanCEP.length === 8) {
        try {
          const response = await fetch(`https://viacep.com.br/ws/${cleanCEP}/json/`);
          const data = await response.json();
          if (!data.erro) {
            document.getElementById('cust-street').value = data.logradouro;
            document.getElementById('cust-neighborhood').value = data.bairro;
            document.getElementById('cust-city').value = data.localidade;
            document.getElementById('cust-state').value = data.uf;
            
            calculateShipping(data.uf);
            document.getElementById('cust-number').focus();
          }
        } catch (e) {
          console.error("Erro ao buscar CEP:", e);
        }
      }
    }

    function generatePixPayload(key, name, city, amount, txId = "LOJA123") {
      const formatField = (id, value) => `${id}${value.length.toString().padStart(2, '0')}${value}`;
      const merchantAccount = formatField('00', 'br.gov.bcb.pix') + formatField('01', key);

      let payload = 
        formatField('00', '01') +
        formatField('26', merchantAccount) +
        formatField('52', '0000') +
        formatField('53', '986') +
        formatField('54', amount.toFixed(2)) +
        formatField('58', 'BR') +
        formatField('59', name) +
        formatField('60', city) +
        formatField('62', formatField('05', txId)) +
        '6304';

      function crc16(str) {
        let crc = 0xFFFF;
        for (let i = 0; i < str.length; i++) {
          crc ^= str.charCodeAt(i) << 8;
          for (let j = 0; j < 8; j++) {
            crc = (crc & 0x8000) !== 0 ? (crc << 1) ^ 0x1021 : crc << 1;
            crc &= 0xFFFF;
          }
        }
        return crc.toString(16).toUpperCase().padStart(4, '0');
      }

      return payload + crc16(payload);
    }

    function openCheckout(e) {
      e.preventDefault();

      customerData = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        cep: document.getElementById('cust-cep').value,
        street: document.getElementById('cust-street').value,
        number: document.getElementById('cust-number').value,
        comp: document.getElementById('cust-comp').value,
        neighborhood: document.getElementById('cust-neighborhood').value,
        city: document.getElementById('cust-city').value,
        state: document.getElementById('cust-state').value,
      };

      toggleCart();
      const pixModal = document.getElementById('pix-modal');
      pixModal.classList.remove('hidden');

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const totalSum = subtotal + shippingCost;

      document.getElementById('pix-amount').innerText = `R$ ${totalSum.toFixed(2).replace('.', ',')}`;

      document.getElementById('delivery-summary').innerHTML = `
        <p class="font-extrabold border-b border-indigo-200/60 pb-1 mb-1">📍 Entregar para: ${customerData.name}</p>
        <p>${customerData.street}, nº ${customerData.number} ${customerData.comp ? '('+customerData.comp+')' : ''}</p>
        <p>${customerData.neighborhood} - ${customerData.city}/${customerData.state} - CEP: ${customerData.cep}</p>
        <div class="mt-2 pt-2 border-t border-indigo-200/60 flex justify-between font-bold text-indigo-950">
          <span>🚚 Frete (${shippingDays} dias úteis):</span>
          <span>${shippingCost === 0 ? "GRÁTIS" : 'R$ ' + shippingCost.toFixed(2).replace('.', ',')}</span>
        </div>
      `;

      const whatsappNumber = "5561996077907";
      const itemsList = cart.map(i => `- ${i.quantity}x ${i.title}`).join('\n');
      const msgText = encodeURIComponent(
        `*Novo Pedido na Loja!*\n\n` +
        `*Cliente:* ${customerData.name}\n` +
        `*Itens:*\n${itemsList}\n\n` +
        `*Subtotal:* R$ ${subtotal.toFixed(2)}\n` +
        `*Frete:* R$ ${shippingCost.toFixed(2)} (${shippingDays} dias úteis)\n` +
        `*Total com Frete:* R$ ${totalSum.toFixed(2)}\n\n` +
        `*Endereço de Entrega:*\n` +
        `${customerData.street}, ${customerData.number} (${customerData.comp})\n` +
        `${customerData.neighborhood} - ${customerData.city}/${customerData.state}\n` +
        `CEP: ${customerData.cep}`
      );
      document.getElementById('whatsapp-btn').href = `https://wa.me/${whatsappNumber}?text=${msgText}`;

      const pixKey = "08388624113";
      const receiverName = "TechStore";
      const receiverCity = "SAO PAULO";

      const pixString = generatePixPayload(pixKey, receiverName, receiverCity, totalSum);
      document.getElementById('pix-code-input').value = pixString;

      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = ""; 
      new QRCode(qrContainer, {
        text: pixString,
        width: 170,
        height: 170,
        colorDark : "#1e1b4b",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.M
      });

      confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
    }

    function closeCheckout() {
      document.getElementById('pix-modal').classList.add('hidden');
    }

    function copyPixCode() {
      const copyText = document.getElementById('pix-code-input');
      copyText.select();
      navigator.clipboard.writeText(copyText.value);

      const toast = document.getElementById('copy-toast');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    renderProducts();
    updateCart();
  </script>
